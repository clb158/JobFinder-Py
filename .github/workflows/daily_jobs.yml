name: Daily Job Finder

on:
  schedule:
    - cron: '0 14 * * *'  # 9:00 AM EST (14:00 UTC)
  workflow_dispatch:       # allows manual trigger from GitHub UI

jobs:
  run-bot:
    runs-on: ubuntu-latest

    permissions:
      contents: write      # needed to commit seen_jobs.json back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run job finder
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python main.py

      - name: Save seen jobs back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_jobs.json || true
          git diff --staged --quiet || git commit -m "chore: update seen/applied jobs [skip ci]"
          git push
